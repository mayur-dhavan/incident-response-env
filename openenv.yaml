description: >
  Simulated production incident-response environment with 5 progressively
  harder SRE debugging tasks (OOM crash, memory leak, cascading failure,
  cache poisoning, TLS cert expiry).  Agents investigate via structured
  observations, apply targeted fixes, and are graded on root-cause analysis,
  correct remediation, and step efficiency.
