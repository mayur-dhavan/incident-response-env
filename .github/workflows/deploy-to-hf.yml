name: Deploy to HF Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: true

      - name: Build HF Space directory structure (flat layout)
        run: |
          mkdir -p hf_deploy/server

          # HF Space root files (wrapper for Docker deployment)
          cp .hf/Dockerfile       hf_deploy/Dockerfile
          cp .hf/requirements.txt hf_deploy/requirements.txt
          cp .hf/README.md        hf_deploy/README.md

          # Python source files at root
          cp __init__.py   hf_deploy/
          cp models.py     hf_deploy/
          cp client.py     hf_deploy/
          cp baseline.py   hf_deploy/
          cp demo.py       hf_deploy/

          # Server subpackage
          cp server/__init__.py    hf_deploy/server/
          cp server/app.py         hf_deploy/server/
          cp server/environment.py hf_deploy/server/
          cp server/graders.py     hf_deploy/server/
          cp server/scenarios.py   hf_deploy/server/

          # Hackathon validation files
          cp inference.py   hf_deploy/
          cp openenv.yaml   hf_deploy/
          cp pyproject.toml hf_deploy/
          cp uv.lock        hf_deploy/

      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd hf_deploy
          git init
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .
          git commit -m "Deploy: ${{ github.repository }}@${{ github.sha }}"
          git push --force \
            "https://mayur6901:${HF_TOKEN}@huggingface.co/spaces/mayur6901/incident-response-env" \
            HEAD:main
